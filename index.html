<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Rating</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f5f5f5;
        padding: 20px;
    }
    .container {
        background: white;
        padding: 20px;
        border-radius: 15px;
        width: 350px;
        margin: auto;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    img {
        max-width: 100%;
        border-radius: 10px;
        margin-top: 15px;
    }
    input[type="range"] {
        width: 100%;
    }
    .rating {
        font-size: 20px;
        margin-top: 10px;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Photo Rating App ⭐</h2>
    
    <input type="file" id="upload" accept="image/*"><br>
    
    <img id="preview" src="" alt="Upload Photo Here" style="display:none;">
    
    <div style="margin-top:15px;">
        <input type="range" min="1" max="10" value="5" id="slider">
        <div class="rating">Rating: <span id="value">5</span>/10</div>
    </div>
</div>

<script>
const upload = document.getElementById('upload');
const preview = document.getElementById('preview');
const slider = document.getElementById('slider');
const value = document.getElementById('value');

upload.addEventListener('change', function() {
    const file = upload.files[0];
    if(file){
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
    }
});

slider.addEventListener('input', function() {
    value.textContent = slider.value;
});
</script>

</body>
</html>
